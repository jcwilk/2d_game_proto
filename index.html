<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>2D game prototype</title>
  </head>
  <body>
    <div id="app">
      <div id="game-root">
        <div id="game-stage">
          <div id="game-canvas-wrap">
            <canvas id="game-canvas"></canvas>
          </div>
        </div>
        <div id="game-controls" aria-label="Movement controls">
          <div
            id="game-stuck-orb"
            class="game-stuck-orb"
            role="button"
            tabindex="-1"
            aria-label="Drag to apply stuck to monster"
          >
            <div class="game-stuck-orb-sprite" role="img" aria-hidden="true"></div>
          </div>
          <div
            id="game-chrome-up"
            class="game-chrome"
            data-dir="up"
            aria-label="Move up"
            role="button"
            tabindex="-1"
          >
            <div class="game-chrome-img" role="img" aria-hidden="true"></div>
          </div>
          <div
            id="game-chrome-down"
            class="game-chrome"
            data-dir="down"
            aria-label="Move down"
            role="button"
            tabindex="-1"
          >
            <div class="game-chrome-img" role="img" aria-hidden="true"></div>
          </div>
          <div
            id="game-chrome-left"
            class="game-chrome"
            data-dir="left"
            aria-label="Move left"
            role="button"
            tabindex="-1"
          >
            <div class="game-chrome-img" role="img" aria-hidden="true"></div>
          </div>
          <div
            id="game-chrome-right"
            class="game-chrome"
            data-dir="right"
            aria-label="Move right"
            role="button"
            tabindex="-1"
          >
            <div class="game-chrome-img" role="img" aria-hidden="true"></div>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
